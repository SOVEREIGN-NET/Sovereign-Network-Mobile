# Android NDK cross-compilation configuration
# Uses NDK 27.1 toolchain

# Each target adds the linker flag `-Wl,-z,max-page-size=16384` so the
# resulting .so segments are aligned to 16 KB instead of 4 KB. Android
# 15+ (and Google Play's bundle scanner) reject native libs aligned at
# 4 KB on devices that use 16 KB memory pages — the warning surfaces as
# "Your app does not support 16 KB memory page sizes". The flag is
# benign on 4 KB-page devices (over-aligned LOAD segments still load
# fine), so it's the right default for every Android target.

[target.aarch64-linux-android]
linker = "/Users/supertramp/Library/Android/sdk/ndk/27.1.12297006/toolchains/llvm/prebuilt/darwin-x86_64/bin/aarch64-linux-android24-clang"
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384"]

[target.armv7-linux-androideabi]
linker = "/Users/supertramp/Library/Android/sdk/ndk/27.1.12297006/toolchains/llvm/prebuilt/darwin-x86_64/bin/armv7a-linux-androideabi24-clang"
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384"]

[target.x86_64-linux-android]
linker = "/Users/supertramp/Library/Android/sdk/ndk/27.1.12297006/toolchains/llvm/prebuilt/darwin-x86_64/bin/x86_64-linux-android24-clang"
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384"]

[target.i686-linux-android]
linker = "/Users/supertramp/Library/Android/sdk/ndk/27.1.12297006/toolchains/llvm/prebuilt/darwin-x86_64/bin/i686-linux-android24-clang"
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384"]
