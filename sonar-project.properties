sonar.projectKey=SovereignNetworkMobile
sonar.projectName=Sovereign Network Mobile
sonar.projectVersion=0.0.1
sonar.sources=src
sonar.tests=__tests__
sonar.exclusions=node_modules/**,dist/**,build/**
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# TypeScript/JavaScript specific
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Disable false positive rules for React JSX prop destructuring
# Rule S6767: Props are used in JSX but sonarqube can't detect them through destructuring
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S6767
sonar.issue.ignore.multicriteria.e1.resourceKey=src/components/**/*.tsx
